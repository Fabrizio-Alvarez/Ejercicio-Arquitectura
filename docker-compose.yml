services:
  # Local dev container (SQLite). Run composer/artisan/pest through it, e.g.:
  #   docker compose run --rm app composer install
  #   docker compose run --rm app php vendor/bin/pest
  app:
    image: composer:2
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    command: ["tail", "-f", "/dev/null"]

  # --- Perfil Postgres (opt-in) -------------------------------------------
  # Levanta un Postgres 16 y un container con ambos drivers (pdo_sqlite +
  # pdo_pgsql) para correr la app contra Postgres. El environment del
  # app-pg overridea .env automáticamente — no hace falta editar .env.
  #   docker compose --profile postgres up -d postgres app-pg
  #   docker compose --profile postgres exec app-pg php artisan migrate:fresh --seed
  #   docker compose --profile postgres exec app-pg php vendor/bin/pest
  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: supermercado
      POSTGRES_USER: supermercado
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app-pg:
    build:
      context: .
      dockerfile: Dockerfile.dev
    profiles: ["postgres"]
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    depends_on:
      - postgres
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: supermercado
      DB_USERNAME: supermercado
      DB_PASSWORD: secret
    command: ["tail", "-f", "/dev/null"]

volumes:
  pgdata:
